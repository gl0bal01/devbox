http:
  middlewares:
    internal-only:
      ipAllowList:
        sourceRange:
          - "100.64.0.0/10"        # Tailscale IPv4 CGNAT
          - "fd7a:115c:a1e0::/48"  # Tailscale IPv6 ULA
          - "127.0.0.1/32"         # In-container healthcheck
          - "::1/128"              # IPv6 loopback
