# Traefik reverse proxy + docker-socket-proxy
#
# Base file: HTTP-only mode, Tailscale-bound.
# For HTTPS mode, additionally use docker-compose.https.yml as a Compose override
# (configured via COMPOSE_FILE in ~/.config/devbox/config.env).
#
# Image digests are locked in docker-compose.lock.yml — that file is committed
# and is ALWAYS included in the compose invocation. Do not edit image: lines
# here; bump tags, then run scripts/update-images.sh --apply.
#
# x-logging: this anchor block is duplicated by design across every compose file
# in services/. Drift detection is enforced by scripts/ci/check-anchor-consistency.sh.
# Any change must be applied to every compose file in one commit.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Docker socket proxy — exposes a read-only subset of the docker API to Traefik
  # so Traefik never touches /var/run/docker.sock directly.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: docker-socket-proxy
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 10s
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      INFO: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /run
      - /tmp
    mem_limit: 64m
    cpus: 0.25
    pids_limit: 50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2375/_ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 30s
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${TAILSCALE_IP}:80:80"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./logs:/var/log/traefik
    networks:
      - proxy-net
      - socket-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.internal`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=dashboard-auth@file"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 0.5
    pids_limit: 100

networks:
  proxy-net:
    external: true
  socket-proxy:
    driver: bridge
    internal: true
