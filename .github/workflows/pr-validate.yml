name: pr-validate
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pr-validate-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub (rate-limit headroom)
        # Skip cleanly when secrets are absent (fork / first-time setup).
        # Anonymous pulls work until the 100/6h/IP rate limit. Set
        # DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets to enable
        # authenticated pulls.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lint (shellcheck + bash -n + bats)
        run: ./scripts/ci/lint.sh

      - name: Compose config validate (HTTP + HTTPS)
        run: ./scripts/ci/check-compose-config.sh

      - name: Anchor consistency
        run: ./scripts/ci/check-anchor-consistency.sh

      - name: Docs <-> tree consistency
        run: ./scripts/ci/check-docs-tree.sh

      - name: Check digest lockfile freshness
        run: ./scripts/update-images.sh --check
